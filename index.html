<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>镀层厚度计算器</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .formula {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 25px;
            font-family: "Times New Roman", serif;
            font-size: 18px;
            color: #555;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .result {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-top: 25px;
        }
        .result-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        .result-value {
            font-size: 32px;
            font-weight: bold;
        }
        .result-value.negative {
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>镀层厚度计算器</h1>
        <div class="formula">log(10<sup>-x/20</sup>) × k</div>

        <div class="input-group">
            <label>EMI降低量（dB）</label>
            <input type="number" id="xInput" placeholder="请输入x值" step="any">
        </div>

        <div class="input-group">
            <label>集肤深度（μm）</label>
            <input type="number" id="kInput" placeholder="请输入k值" step="any">
        </div>

        <div class="result">
            <div class="result-label">镀层厚度（μm）</div>
            <div class="result-value" id="result">—</div>
        </div>
    </div>

    <script>
        const xInput = document.getElementById('xInput');
        const kInput = document.getElementById('kInput');
        const resultDisplay = document.getElementById('result');

        function calculate() {
            const x = parseFloat(xInput.value);
            const k = parseFloat(kInput.value);

            if (isNaN(x) || isNaN(k)) {
                resultDisplay.textContent = '—';
                resultDisplay.classList.remove('negative');
                return;
            }

            const result = Math.log10(Math.pow(10, -x / 20)) * k;
            resultDisplay.textContent = result.toFixed(4);

            if (result < 0) {
                resultDisplay.classList.add('negative');
            } else {
                resultDisplay.classList.remove('negative');
            }
        }

        xInput.addEventListener('input', calculate);
        kInput.addEventListener('input', calculate);
    </script>
</body>
</html>
