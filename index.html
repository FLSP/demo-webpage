<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>镀层厚度计算器</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .formula {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 25px;
            font-family: "Times New Roman", serif;
            font-size: 18px;
            color: #555;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        input, select {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
            background: white;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        .result {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-top: 25px;
        }
        .result-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        .result-value {
            font-size: 32px;
            font-weight: bold;
        }
        .info {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>镀层厚度计算器</h1>
        <div class="formula">ln(10<sup>x/20</sup>) × δ</div>

        <div class="input-group">
            <label>EMI降低量（dB）</label>
            <input type="number" id="xInput" placeholder="请输入x值" step="any">
        </div>

        <div class="input-group">
            <label>材料</label>
            <select id="materialSelect">
                <option value="aluminum">铝</option>
                <option value="copper">铜</option>
                <option value="stainless">不锈钢</option>
            </select>
        </div>

        <div class="input-group">
            <label>频率（Hz）</label>
            <input type="number" id="freqInput" placeholder="请输入频率" step="any">
            <div class="info">常用值：50Hz（电力）、1MHz（射频）</div>
        </div>

        <div class="result">
            <div class="result-label">集肤深度（μm）</div>
            <div class="result-value" id="skinDepth">—</div>
        </div>

        <div class="result" style="margin-top: 15px;">
            <div class="result-label">镀层厚度（μm）</div>
            <div class="result-value" id="result">—</div>
        </div>
    </div>

    <script>
        const xInput = document.getElementById('xInput');
        const materialSelect = document.getElementById('materialSelect');
        const freqInput = document.getElementById('freqInput');
        const skinDepthDisplay = document.getElementById('skinDepth');
        const resultDisplay = document.getElementById('result');

        // Skin depth coefficients (δ = coeff / sqrt(f) μm)
        const skinDepthCoeff = {
            copper: 20120,
            aluminum: 26740,
            stainless: 67300
        };

        function calculateSkinDepth(material, freq) {
            return skinDepthCoeff[material] / Math.sqrt(freq);
        }

        function calculate() {
            const x = parseFloat(xInput.value);
            const freq = parseFloat(freqInput.value);
            const material = materialSelect.value;

            if (isNaN(x) || isNaN(freq) || freq <= 0) {
                skinDepthDisplay.textContent = '—';
                resultDisplay.textContent = '—';
                return;
            }

            const skinDepth = calculateSkinDepth(material, freq);
            skinDepthDisplay.textContent = skinDepth.toFixed(2);

            const result = Math.log(Math.pow(10, x / 20)) * skinDepth;
            resultDisplay.textContent = result.toFixed(4);
        }

        xInput.addEventListener('input', calculate);
        materialSelect.addEventListener('change', calculate);
        freqInput.addEventListener('input', calculate);
    </script>
</body>
</html>
